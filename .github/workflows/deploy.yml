name: CI — Lint, Type-check & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npx tsc --noEmit

# ────────────────────────────────────────────────────────────────
# Deploy to Cloud Run (ปัจจุบันปิดไว้ — ใช้ Docker บน VLAN แทน)
# เปิดใช้เมื่อต้องการ deploy ขึ้น Google Cloud Run จริง โดย:
#   1. ตั้งค่า GitHub Secrets:
#      - GCP_PROJECT_ID
#      - GCP_WORKLOAD_IDENTITY_PROVIDER  (หรือ GCP_SA_KEY สำหรับ JSON key)
#      - GCP_SERVICE_ACCOUNT
#      - DATA_STORE_ID
#   2. เปลี่ยน workflow_dispatch → push เพื่อ deploy อัตโนมัติ
# ────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: false  # ← ปิดไว้ก่อน เปิดเมื่อพร้อม deploy จริง
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud auth configure-docker --quiet
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/qtec-brain:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/qtec-brain:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: qtec-brain
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/qtec-brain:${{ github.sha }}
          region: asia-southeast1
          env_vars: |
            MOCK_MODE=false
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
