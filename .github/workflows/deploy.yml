name: Deploy to Cloud Run

on:
  push:
    branches:
      - main      # → Production
      - develop   # → Staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/qtec-brain

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=production" >> $GITHUB_OUTPUT
            echo "SERVICE=qtec-brain" >> $GITHUB_OUTPUT
            echo "ENV_SUFFIX=" >> $GITHUB_OUTPUT
          else
            echo "TAG=staging" >> $GITHUB_OUTPUT
            echo "SERVICE=qtec-brain-staging" >> $GITHUB_OUTPUT
            echo "ENV_SUFFIX=-staging" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build \
            --tag $IMAGE:${{ steps.tag.outputs.TAG }} \
            --tag $IMAGE:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ steps.tag.outputs.TAG }}
          docker push $IMAGE:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.tag.outputs.SERVICE }} \
            --image=$IMAGE:${{ github.sha }} \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=2 \
            --max-instances=10 \
            --min-instances=1 \
            --set-env-vars="MOCK_MODE=false,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,DATA_STORE_ID=${{ secrets.DATA_STORE_ID }}" \
            --set-secrets="GOOGLE_CHAT_WEBHOOK_URL=google-chat-webhook:latest" \
            --project=$PROJECT_ID

      - name: Notify deployment
        run: |
          echo "✅ Deployed ${{ steps.tag.outputs.SERVICE }} @ ${{ github.sha }}"
